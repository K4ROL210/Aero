<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aero Squash — Zapisy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0a0a0b;
  --bg2:        #111114;
  --bg3:        #18181c;
  --surface:    #1c1c21;
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --text:       #f0f0f5;
  --text2:      #9898a8;
  --text3:      #555565;
  --gold:       #c9a84c;
  --gold-lt:    rgba(201,168,76,0.12);
  --gold-mid:   rgba(201,168,76,0.25);
  --green:      #2dca72;
  --green-lt:   rgba(45,202,114,0.1);
  --orange:     #f5943a;
  --orange-lt:  rgba(245,148,58,0.1);
  --blue:       #5b8ef0;
  --blue-lt:    rgba(91,142,240,0.1);
  --red:        #e05555;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 400px;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.site-header {
  position: relative;
  z-index: 10;
  padding: 52px 40px 0;
  max-width: 1000px;
  margin: 0 auto;
}
@media (max-width: 600px) { .site-header { padding: 32px 16px 0; } }

.brand-row {
  display: flex;
  align-items: flex-end;
  gap: 20px;
  margin-bottom: 6px;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: clamp(48px, 10vw, 88px);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 0.92;
  color: var(--text);
}
.brand-name span { color: var(--gold); }

.brand-tag {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text3);
  padding-bottom: 10px;
}

.brand-sub {
  font-size: 14px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 12px;
  font-weight: 500;
}

.gold-rule {
  max-width: 1000px;
  margin: 28px auto;
  padding: 0 40px;
}
@media (max-width: 600px) { .gold-rule { padding: 0 16px; } }
.gold-rule-inner {
  height: 1px;
  background: linear-gradient(90deg, var(--gold) 0%, rgba(201,168,76,0.15) 40%, transparent 70%);
}

/* ── MAIN ── */
.main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 40px;
  position: relative;
  z-index: 1;
}
@media (max-width: 600px) { .main { padding: 0 16px; } }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  position: relative;
  /* overflow: visible — NIE hidden, żeby tagi były widoczne */
  transition: border-color .2s;
}
.card:hover { border-color: var(--border2); }

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--day-color, var(--gold)) 0%, transparent 60%);
  z-index: 1;
}

/* ── CARD HEAD ── */
.card-head {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}
@media (max-width: 400px) { .card-head { padding: 16px 14px 14px; } }

.day-name {
  font-family: 'Syne', sans-serif;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
}
.day-name em { color: var(--day-color, var(--gold)); font-style: normal; }

.card-meta-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 8px;
}

.day-date {
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 1px;
}

.day-time {
  font-size: 11px;
  font-weight: 600;
  color: var(--day-color, var(--gold));
  background: var(--gold-lt);
  padding: 2px 8px;
  letter-spacing: 1px;
}

.count-chip {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
}

/* ── PLAYER LIST ── */
.player-list { flex: 1; }

.player-row {
  /* flex zamiast grid — grid z fixed columns ucinał tagi na mobile */
  display: flex;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
  animation: slideIn .18s ease;
}
.player-row:last-child { border-bottom: none; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: none; }
}

.num {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-align: right;
  padding-top: 14px;
  padding-left: 10px;
  opacity: 0.5;
  flex-shrink: 0;
  width: 28px;
  min-width: 28px;
}

.player-inner {
  flex: 1;
  padding: 11px 12px 11px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0; /* potrzebne żeby flex child mógł się zawijać */
}

.pname {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  word-break: break-word;
}
.pname.dim { opacity: 0.4; }

/* Tags */
.tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid;
  white-space: nowrap;
  border-radius: 2px;
  /* tylko wyświetlanie — brak interakcji */
  user-select: none;
  pointer-events: none;
}
.tag.clickable {
  pointer-events: auto;
  cursor: pointer;
  transition: opacity .15s;
}
.tag.clickable:hover { opacity: 0.75; }
  

.tag-green  { border-color: var(--green);  color: var(--green);  background: var(--green-lt); }
.tag-orange { border-color: var(--orange); color: var(--orange); background: var(--orange-lt); }
.tag-blue1  { border-color: var(--blue);   color: var(--blue); }
.tag-blue2  { border-color: var(--blue);   color: #fff; background: var(--blue); }

/* Note */
.note-line {
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
  line-height: 1.4;
  word-break: break-word;
}

/* Row actions */
.row-actions {
  display: flex;
  align-items: flex-start;
  padding: 10px 12px 0 4px;
  gap: 4px;
  flex-shrink: 0;
}

.act-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text3);
  width: 26px; height: 26px;
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.act-btn.edit:hover, .act-btn.edit:active { border-color: var(--gold); color: var(--gold); }
.act-btn.del:hover,  .act-btn.del:active  { border-color: var(--red);  color: var(--red); }
.act-btn.ok:hover,   .act-btn.ok:active   { border-color: var(--green); color: var(--green); }

/* Status */
.msg-empty, .msg-loading {
  padding: 28px 20px;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  font-weight: 500;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 1.5px solid var(--border2);
  border-top-color: var(--text3);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* REZERWA */
.rezerwa-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--orange);
  background: var(--orange-lt);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}

/* ── ADD SECTION ── */
.add-section {
  border-top: 1px solid var(--border);
  background: var(--bg3);
}

.add-name-row {
  display: flex;
}

.add-input {
  flex: 1;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 400;
  padding: 13px 16px;
  outline: none;
  transition: background .15s;
  min-width: 0;
}
.add-input::placeholder { color: var(--text3); }
.add-input:focus { background: var(--surface); }

.add-btn {
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 0 18px;
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  cursor: pointer;
  transition: background .15s;
  min-width: 48px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.add-btn:hover, .add-btn:active { background: #d9b85c; }
.add-btn:disabled { opacity: 0.3; cursor: default; }

/* Options */
.add-opts-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 16px 12px;
  border-top: 1px solid var(--border);
  align-items: center;
}

.opt-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--border2);
  color: var(--text3);
  cursor: pointer;
  border-radius: 2px;
  transition: all .15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.opt-tag:hover, .opt-tag:active { border-color: var(--text3); color: var(--text2); }
.opt-tag.sel-green  { border-color: var(--green);  color: var(--green);  background: var(--green-lt); }
.opt-tag.sel-orange { border-color: var(--orange); color: var(--orange); background: var(--orange-lt); }
.opt-tag.sel-1x     { border-color: var(--blue);   color: var(--blue); }
.opt-tag.sel-2x     { border-color: var(--blue);   color: #fff; background: var(--blue); }

.note-input {
  flex: 1;
  min-width: 100px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-style: italic;
  padding: 5px 10px;
  border-radius: 2px;
  outline: none;
  transition: border-color .15s;
}
.note-input::placeholder { color: var(--text3); }
.note-input:focus { border-color: var(--border2); }

/* Edit input */
.edit-input {
  background: var(--surface);
  border: 1px solid var(--gold-mid);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 500;
  padding: 4px 10px;
  outline: none;
  width: 100%;
}

/* Error */
.add-error {
  padding: 9px 16px;
  font-size: 11px;
  color: var(--red);
  background: rgba(224,85,85,0.06);
  border-top: 1px solid rgba(224,85,85,0.15);
  letter-spacing: 0.3px;
}

/* ── FOOTER ── */
.site-footer {
  text-align: center;
  padding: 60px 16px 0;
  max-width: 1000px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.site-footer p {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
  line-height: 1.9;
  text-transform: uppercase;
}
</style>
</head>
<body>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWpjxsBltmthPsnVHxMZyeElNMk7LLnZddctCGhS3ZhlJtYaEFpGgjUu4RTzMFvfT1wQ/exec";
  const CUTOFF_HOUR = 13;
</script>

<header class="site-header">
  <div class="brand-row">
    <div class="brand-name"><span>AERO</span></div>
    <div class="brand-tag">Squash</div>
  </div>
  <div class="brand-sub">Zapisy</div>
</header>

<div class="gold-rule"><div class="gold-rule-inner"></div></div>

<main class="main">
  <div class="grid" id="grid"></div>
</main>

<footer class="site-footer">
  <p>Administratorem danych jest Karol Kreczmański<br>Dane zbierane w celu organizacji ligi · Uczestnik może żądać usunięcia</p>
</footer>

<script>
const DAYS = [
  { key:'tue', label:'Wtorek', dow:2, time:'', color:'#c9a84c' },
  { key:'fri', label:'Piątek', dow:5, time:'', color:'#5b8ef0' },
];
const REZERWA = 'REZERWA';

// ── Extra data (tagi) — przechowywane po stronie serwera ─
// state.extras[dk] = { "0": {avail,multi,note}, "1": {...}, ... }
function getEx(dk, i) {
  return (state.extras[dk] || {})[String(i)] || { avail: null, multi: null, note: '' };
}

// ── Date helpers ─────────────────────────────────────
function getNextDate(dow) {
  const now = new Date();
  const cur = now.getDay();
  const h   = parseInt(new Date().toLocaleString('pl-PL', { hour:'2-digit', hour12:false, timeZone:'Europe/Warsaw' }));
  let diff  = (dow - cur + 7) % 7;
  if (diff === 0 && h >= CUTOFF_HOUR) diff = 7;
  const d = new Date(now);
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(d) {
  return d.toLocaleDateString('pl-PL', { day:'2-digit', month:'2-digit', year:'numeric' });
}

// ── State ─────────────────────────────────────────────
const state = {
  days:    DAYS.map(d => ({ ...d, date: getNextDate(d.dow) })),
  lists:   {},   // dk → string[]
  extras:  {},   // dk → { "0": {avail,multi,note}, ... }
  loading: {},
  saving:  {},
  inputs:  {},
  errors:  {},
  editing: null,
  editVal: '',
  fAvail:  {},
  fMulti:  {},
  fNote:   {},
};

// ── API (JSONP) ───────────────────────────────────────
function api(params) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Math.random().toString(36).slice(2);
    let el;
    const t = setTimeout(() => { delete window[cb]; el && el.remove(); rej(new Error('timeout')); }, 10000);
    window[cb] = data => { clearTimeout(t); delete window[cb]; el && el.remove(); res(data); };
    el = document.createElement('script');
    el.src = APPS_SCRIPT_URL + '?' + new URLSearchParams({ ...params, callback: cb });
    el.onerror = () => { clearTimeout(t); delete window[cb]; rej(new Error('err')); };
    document.head.appendChild(el);
  });
}

// ── Data ops ──────────────────────────────────────────
async function loadDay(day) {
  state.loading[day.key] = true; render();
  try {
    const r = await api({ action:'list', dayKey:day.key, dateStr:dateKey(day.date) });
    if (r.ok) {
      state.lists[day.key]  = r.players;
      state.extras[day.key] = r.extra || {};
    }
  } catch(e) {}
  state.loading[day.key] = false; render();
}

async function addPlayer(dk) {
  const day  = state.days.find(d => d.key === dk);
  const name = (state.inputs[dk] || '').trim();
  if (!name) return;
  const av = state.fAvail[dk] || '';
  const mu = state.fMulti[dk] || '';
  const no = (state.fNote[dk]  || '').trim();
  state.saving[dk] = true; state.errors[dk] = null; render();
  try {
    const r = await api({ action:'add', dayKey:dk, dateStr:dateKey(day.date), name, avail:av, multi:mu, note:no });
    if (r.ok) {
      state.lists[dk]  = r.players;
      state.extras[dk] = r.extra || {};
      state.inputs[dk] = ''; state.fAvail[dk] = null; state.fMulti[dk] = null; state.fNote[dk] = '';
try { localStorage.removeItem('form_' + dk); } catch(e) {}
    } else {
      state.errors[dk] = r.error;
    }
  } catch(e) { state.errors[dk] = 'Błąd połączenia'; }
  state.saving[dk] = false; render();
}

async function removePlayer(dk, idx) {
  const day = state.days.find(d => d.key === dk);
  try {
    const r = await api({ action:'remove', dayKey:dk, dateStr:dateKey(day.date), idx, password:'__public__' });
    if (r.ok) {
      state.lists[dk]  = r.players;
      state.extras[dk] = r.extra || {};
      render();
    }
  } catch(e) {}
}

async function saveEdit(dk) {
  if (!state.editing) return;
  const day = state.days.find(d => d.key === dk);
  try {
    const r = await api({ action:'edit', dayKey:dk, dateStr:dateKey(day.date), idx:state.editing.idx, newName:state.editVal, password:'__public__' });
    if (r.ok) {
      state.lists[dk]  = r.players;
      state.extras[dk] = r.extra || {};
      state.editing = null; render();
    }
  } catch(e) {}
}
  async function toggleAvail(dk, idx, currentAvail) {
  const day = state.days.find(d => d.key === dk);
  const newAvail = currentAvail === 'green' ? 'orange' : 'green';
  try {
    const r = await api({
      action: 'setAvail',
      dayKey: dk,
      dateStr: dateKey(day.date),
      idx,
      avail: newAvail,
      password: '__public__'
    });
    if (r.ok) {
      state.extras[dk] = r.extra || {};
      render();
    }
  } catch(e) {}
}

// ── Render ────────────────────────────────────────────
function saveFormToStorage(dk) {
  try {
    const val = JSON.stringify({
      name:  state.inputs[dk] || '',
      avail: state.fAvail[dk] || null,
      multi: state.fMulti[dk] || null,
      note:  state.fNote[dk]  || '',
    });
    console.log('saving', 'form_' + dk, val);
    localStorage.setItem('form_' + dk, val);

function loadFormFromStorage() {
  for (const day of state.days) {
    try {
      const raw = localStorage.getItem('form_' + day.key);
      if (!raw) continue;
      const d = JSON.parse(raw);
      if (d.name)  state.inputs[day.key] = d.name;
      if (d.avail) state.fAvail[day.key] = d.avail;
      if (d.multi) state.fMulti[day.key] = d.multi;
      if (d.note)  state.fNote[day.key]  = d.note;
    } catch(e) {}
  }
}
  
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const day of [...state.days].sort((a, b) => a.date - b.date)) {
    grid.appendChild(mkCard(day));
  }
}

function mkCard(day) {
  const players = state.lists[day.key] || [];
  const loading = state.loading[day.key];
  const saving  = state.saving[day.key];
  const err     = state.errors[day.key];
  const nonR    = players.filter(p => p !== REZERWA);

  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--day-color', day.color);

  // Head
  const head = document.createElement('div');
  head.className = 'card-head';
  head.innerHTML = `
    <div class="day-name"><em>${day.label}</em></div>
    <div class="card-meta-row">
      <span class="day-date">${formatDate(day.date)}</span>
      <span class="day-time">${day.time}</span>
      ${nonR.length > 0 ? `<span class="count-chip">${nonR.length} graczy</span>` : ''}
    </div>`;
  card.appendChild(head);

  // List
  const list = document.createElement('div');
  list.className = 'player-list';

  if (loading) {
    list.innerHTML = `<div class="msg-loading"><span class="spinner"></span></div>`;
  } else if (players.length === 0) {
    list.innerHTML = `<div class="msg-empty">Brak zapisów</div>`;
  } else {
    players.forEach((name, i) => {

      // Separator rezerwy
      if (name === REZERWA) {
        const sep = document.createElement('div');
        sep.className = 'rezerwa-sep';
        sep.textContent = '▾  Rezerwa';
        list.appendChild(sep);
        return;
      }

      const isAfterR = players.slice(0, i).includes(REZERWA);
      const visNum   = players.slice(0, i).filter(p => p !== REZERWA).length + 1;
      const isEdit   = state.editing && state.editing.dk === day.key && state.editing.idx === i;
      const ex       = getEx(day.key, i);

      const row = document.createElement('div');
      row.className = 'player-row';

      // Numer
      const numEl = document.createElement('div');
      numEl.className = 'num';
      numEl.textContent = isAfterR ? '—' : visNum;
      row.appendChild(numEl);

      // Inner
      const inner = document.createElement('div');
      inner.className = 'player-inner';

      if (isEdit) {
        const ei = document.createElement('input');
        ei.className = 'edit-input';
        ei.value = state.editVal;
        ei.addEventListener('input', e => state.editVal = e.target.value);
        ei.addEventListener('keydown', e => {
          if (e.key === 'Enter')  saveEdit(day.key);
          if (e.key === 'Escape') { state.editing = null; render(); }
        });
        inner.appendChild(ei);
        setTimeout(() => ei.focus(), 0);
      } else {
        // Imię
        const nameEl = document.createElement('div');
        nameEl.className = 'pname' + (isAfterR ? ' dim' : '');
        nameEl.textContent = name;
        inner.appendChild(nameEl);

        // Tagi — tylko do wyświetlania, NIE klikalne, NIE usuwają się
        const tags = document.createElement('div');
        tags.className = 'tags-row';

        const addTag = (label, cls, onClick) => {
  const t = document.createElement('span');
  t.className = 'tag ' + cls + (onClick ? ' clickable' : '');
  t.textContent = label;
  if (onClick) t.addEventListener('click', onClick);
  tags.appendChild(t);
};

        if (ex.avail === 'green')  addTag('● Pewny',  'tag-green',  () => toggleAvail(day.key, i, 'green'));
if (ex.avail === 'orange') addTag('◐ Może',   'tag-orange', () => toggleAvail(day.key, i, 'orange'));
if (ex.multi === '1x')     addTag('1× Multi', 'tag-blue1');
if (ex.multi === '2x')     addTag('2× Multi', 'tag-blue2');

        if (tags.children.length > 0) inner.appendChild(tags);

        // Uwaga
        if (ex.note) {
          const nl = document.createElement('div');
          nl.className = 'note-line';
          nl.textContent = ex.note;
          inner.appendChild(nl);
        }
      }

      row.appendChild(inner);

      // Przyciski akcji — zawsze widoczne
      const actions = document.createElement('div');
      actions.className = 'row-actions';

      if (isEdit) {
        const ok = document.createElement('button');
        ok.className = 'act-btn ok';
        ok.textContent = '✓';
        ok.title = 'Zapisz';
        ok.addEventListener('click', () => saveEdit(day.key));
        actions.appendChild(ok);
      } else {
        const ed = document.createElement('button');
        ed.className = 'act-btn edit';
        ed.textContent = '✎';
        ed.title = 'Edytuj';
        ed.addEventListener('click', () => {
          state.editing = { dk: day.key, idx: i };
          state.editVal = name;
          render();
        });

        const dl = document.createElement('button');
        dl.className = 'act-btn del';
        dl.textContent = '✕';
        dl.title = 'Usuń';
        dl.addEventListener('click', () => {
          if (confirm(`Usunąć "${name}" z listy?`)) removePlayer(day.key, i);
        });

        actions.appendChild(ed);
        actions.appendChild(dl);
      }

      row.appendChild(actions);
      list.appendChild(row);
    });
  }
  card.appendChild(list);

  // Add section
  const addSec = document.createElement('div');
  addSec.className = 'add-section';

  const nameRow = document.createElement('div');
  nameRow.className = 'add-name-row';

  const inp = document.createElement('input');
  inp.className = 'add-input';
  inp.type = 'text';
  inp.placeholder = 'Imię i nazwisko…';
  inp.value = state.inputs[day.key] || '';
 inp.addEventListener('input', e => {
  state.inputs[day.key] = e.target.value;
  saveFormToStorage(day.key);
  if (state.errors[day.key]) { state.errors[day.key] = null; render(); }
});
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(day.key); });

  const addB = document.createElement('button');
  addB.className = 'add-btn';
  addB.disabled = !!saving;
  addB.innerHTML = saving ? '<span class="spinner"></span>' : '+';
  addB.addEventListener('click', () => addPlayer(day.key));

  nameRow.appendChild(inp);
  nameRow.appendChild(addB);
  addSec.appendChild(nameRow);

  // Opcje formularza
  const opts = document.createElement('div');
  opts.className = 'add-opts-row';

  const ca = state.fAvail[day.key];
  const cm = state.fMulti[day.key];

  const mkOpt = (label, activeCls, isActive, onClick) => {
    const s = document.createElement('span');
    s.className = 'opt-tag' + (isActive ? ' ' + activeCls : '');
    s.textContent = label;
    s.addEventListener('click', onClick);
    return s;
  };

opts.appendChild(mkOpt('● Pewny',  'sel-green',  ca === 'green',  () => { state.fAvail[day.key] = ca === 'green'  ? null : 'green';  saveFormToStorage(day.key); render(); }));
opts.appendChild(mkOpt('◐ Może',   'sel-orange', ca === 'orange', () => { state.fAvail[day.key] = ca === 'orange' ? null : 'orange'; saveFormToStorage(day.key); render(); }));
opts.appendChild(mkOpt('1× Multi', 'sel-1x',     cm === '1x',     () => { state.fMulti[day.key] = cm === '1x'     ? null : '1x';     saveFormToStorage(day.key); render(); }));
opts.appendChild(mkOpt('2× Multi', 'sel-2x',     cm === '2x',     () => { state.fMulti[day.key] = cm === '2x'     ? null : '2x';     saveFormToStorage(day.key); render(); }));

  const ni = document.createElement('input');
  ni.className = 'note-input';
  ni.type = 'text';
  ni.placeholder = 'Uwaga…';
  ni.value = state.fNote[day.key] || '';
  ni.addEventListener('input', e => { state.fNote[day.key] = e.target.value; saveFormToStorage(day.key); });
  opts.appendChild(ni);

  addSec.appendChild(opts);

  // Błąd
  if (err) {
    const errDiv = document.createElement('div');
    errDiv.className = 'add-error';
    errDiv.textContent = err === 'NOT_ON_LIST'
      ? '⚠ Nie znaleziono na liście graczy.'
      : '⚠ ' + err;
    addSec.appendChild(errDiv);
  }

  card.appendChild(addSec);
  return card;
}

loadFormFromStorage();
render();
Promise.all(state.days.map(loadDay));
</script>
</body>
</html>
